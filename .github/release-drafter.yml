name: Release Drafter

tag-template: "v$NEXT_PATCH"

categories:
  - title: "🚀 Features"
    labels:
      - enhancement
      - feature
  - title: "🐛 Bug Fixes"
    labels:
      - bug
  - title: "🧰 Chores"
    labels:
      - chore
  - title: "🧪 Tests"
    labels:
      - test

template: |
  ## What changed
  $CHANGES

  ---
  _This draft release was generated by [Release Drafter](https://github.com/release-drafter/release-drafter)._
